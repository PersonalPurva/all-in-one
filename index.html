<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purva · Study Hub — All Links</title>
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:"Cascadia Code","Consolas",monospace;
  --color-text-primary:#1c1b19;--color-text-secondary:#57534e;--color-text-tertiary:#8b8782;
  --color-background-primary:#ffffff;--color-background-secondary:#f6f5f3;
  --color-border-secondary:#d6d3ce;--color-border-tertiary:#e9e6e2;
  --accent:#0f6e56;--accent-strong:#1d9e75;--page-bg:#fbfaf8;
  --danger:#c0463f;
}
@media(prefers-color-scheme:dark){:root{
  --color-text-primary:#ededed;--color-text-secondary:#b3b0ab;--color-text-tertiary:#827d76;
  --color-background-primary:#1c1b19;--color-background-secondary:#252420;
  --color-border-secondary:#423f39;--color-border-tertiary:#34322e;
  --accent:#5dcaa5;--accent-strong:#1d9e75;--page-bg:#151412;--danger:#e78f88;
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--page-bg)}
body{font-family:var(--font-sans);color:var(--color-text-primary);line-height:1.5;padding:0 0 70px}

/* hero */
.hero{background:linear-gradient(135deg,#0f6e56,#1d9e75 70%,#3bbf93);color:#fff;padding:40px 20px 34px;text-align:center}
@media(prefers-color-scheme:dark){.hero{background:linear-gradient(135deg,#063a2e,#0d5e48 70%,#127a5c)}}
.hero h1{font-size:29px;font-weight:750;letter-spacing:-.6px}
.hero p{font-size:14px;opacity:.92;margin-top:8px;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.6}
.hero .stat{font-size:12px;opacity:.85;margin-top:14px;font-family:var(--font-mono)}

.wrap{max-width:940px;margin:0 auto;padding:0 16px}
.searchbar{position:sticky;top:0;z-index:10;background:var(--page-bg);padding:16px 0 8px;margin-top:-24px}
#search{width:100%;font-size:15px;font-family:var(--font-sans);padding:13px 16px;border-radius:12px;border:1px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;box-shadow:0 4px 14px rgba(0,0,0,.06)}
#search:focus{border-color:var(--accent-strong)}

.section{margin-top:30px}
.section h2{font-size:15px;font-weight:680;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.section h2 .cnt{font-size:11px;color:var(--color-text-tertiary);font-weight:500;background:var(--color-background-secondary);border-radius:10px;padding:2px 9px;margin-left:6px}
.section .sdesc{font-size:12.5px;color:var(--color-text-secondary);margin-top:3px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;margin-top:14px}
.card{position:relative;display:block;text-decoration:none;border:1px solid var(--color-border-tertiary);border-radius:14px;background:var(--color-background-primary);padding:16px;transition:transform .14s,box-shadow .14s,border-color .14s;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.1);border-color:var(--accent-strong)}
.card .row1{display:flex;align-items:center;gap:10px}
.card .ic{font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--color-background-secondary);border-radius:11px;flex-shrink:0}
.card h3{font-size:14.5px;font-weight:650;color:var(--color-text-primary);line-height:1.25}
.card .host{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card p{font-size:12.5px;color:var(--color-text-secondary);margin-top:11px;line-height:1.55}
.card .pill{position:absolute;top:12px;right:12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;border-radius:9px}
.pill-live{background:#e3f6ef;color:var(--accent)}
.pill-local{background:#fdf3e0;color:#b8791b}
.pill-mine{background:#eef;color:#5b5bd6}
@media(prefers-color-scheme:dark){.pill-live{background:#0c2c25}.pill-local{background:#2e2410;color:#e0b055}.pill-mine{background:#1e1e3a;color:#a0a0f0}}
.del{position:absolute;bottom:10px;right:12px;font-size:16px;line-height:1;color:var(--color-text-tertiary);background:none;border:none;cursor:pointer;padding:4px;opacity:0;transition:opacity .15s}
.card:hover .del{opacity:1}
.del:hover{color:var(--danger)}

/* add-link form */
.addcard{border:1.5px dashed var(--color-border-secondary);border-radius:14px;background:var(--color-background-secondary);padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;min-height:120px;transition:border-color .15s,background .15s}
.addcard:hover{border-color:var(--accent-strong)}
.addcard .plus{font-size:30px;color:var(--accent);line-height:1}
.addcard span{font-size:12.5px;color:var(--color-text-secondary);margin-top:6px;font-weight:600}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:16px;padding:22px;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.modal h3{font-size:17px;font-weight:680}
.modal label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--color-text-tertiary);margin-top:14px}
.modal input{width:100%;font-size:14px;font-family:var(--font-sans);padding:10px 12px;margin-top:5px;border-radius:9px;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}
.modal input:focus{border-color:var(--accent-strong)}
.iconrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.iconpick{font-size:18px;width:38px;height:38px;border-radius:9px;border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center}
.iconpick.sel{border-color:var(--accent-strong);background:var(--color-background-primary)}
.mbtns{display:flex;gap:9px;margin-top:20px}
.btn{flex:1;font-size:13.5px;font-weight:600;font-family:var(--font-sans);padding:11px;border-radius:10px;border:none;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.btn-ghost{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.err{font-size:11.5px;color:var(--danger);margin-top:8px;min-height:14px}

.noresult{text-align:center;color:var(--color-text-tertiary);font-size:13px;padding:30px 0;display:none}
.foot{text-align:center;font-size:11px;color:var(--color-text-tertiary);margin-top:44px;line-height:1.7}
</style>
</head>
<body>
<div class="hero">
  <h1>📚 Purva's Study Hub</h1>
  <p>One home for every study site and resource — live pages, local guides, and links you save yourself.</p>
  <div class="stat" id="heroStat"></div>
</div>

<div class="wrap">
  <div class="searchbar">
    <input id="search" type="text" placeholder="🔍 Search all links…" autocomplete="off">
  </div>

  <div id="sections"></div>
  <div class="noresult" id="noresult">No links match your search.</div>

  <div class="foot">
    Saved links live in <b>this browser only</b> (localStorage) — private to you, not uploaded anywhere.<br>
    Tip: bookmark this page as your homepage.
  </div>
</div>

<!-- Add/Edit modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">Add a link</h3>
    <label>Title</label>
    <input id="mTitle" type="text" placeholder="e.g. TryHackMe" maxlength="60">
    <label>URL</label>
    <input id="mUrl" type="text" placeholder="https://…">
    <label>Note (optional)</label>
    <input id="mNote" type="text" placeholder="What is it for?" maxlength="120">
    <label>Icon</label>
    <div class="iconrow" id="iconRow"></div>
    <div class="err" id="mErr"></div>
    <div class="mbtns">
      <button class="btn btn-ghost" id="mCancel">Cancel</button>
      <button class="btn btn-primary" id="mSave">Save link</button>
    </div>
  </div>
</div>

<script>
// ---------- fixed data ----------
const LIVE = [
  {ic:"🐧", title:"Linux", url:"https://personalpurva.github.io/linux-/", note:"Live Linux site."},
  {ic:"📝", title:"Notes", url:"https://personalpurva.github.io/notes/", note:"Study notes site."},
  {ic:"🗺️", title:"Roadmap (Private)", url:"https://personalpurva.github.io/roadmap-private/", note:"Your private roadmap."},
  {ic:"📖", title:"Book Homework", url:"https://personalpurva.github.io/book-homework-/", note:"Textbook homework solutions."},
  {ic:"🛠️", title:"My System", url:"https://personalpurva.github.io/my-system/", note:"Your personal system pages."},
  {ic:"📄", title:"Sample Question Papers", url:"https://personalpurva.github.io/sample-question-papers-/", note:"Practice papers."},
  {ic:"📋", title:"Syllabus", url:"https://personalpurva.github.io/syllabus/", note:"Course syllabus & cyber-skill maps."},
  {ic:"🌐", title:"Networking", url:"https://personalpurva.github.io/network-/", note:"Networking study site."},
  {ic:"📚", title:"Subjects", url:"https://personalpurva.github.io/subjects/index.html", note:"Subject-wise study pages."},
];
const ICONS = ["🔗","⭐","🎯","🧠","💻","🛡️","🌐","📚","🎓","⚡","🔥","🧪","🐍","🔐","📊","🎥"];

// ---------- saved links (localStorage) ----------
const LS_KEY = "purva_hub_links_v1";
function loadSaved(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)) || []; }catch(e){ return []; } }
function storeSaved(a){ localStorage.setItem(LS_KEY, JSON.stringify(a)); }
let saved = loadSaved();

// ---------- render ----------
const sectionsEl = document.getElementById('sections');
const searchEl = document.getElementById('search');
const noResEl = document.getElementById('noresult');
let query = "";

function hostOf(u){ try{ return new URL(u, location.href).hostname.replace('www.',''); }catch(e){ return ""; } }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function cardHTML(item, pillClass, pillText, idx){
  const host = hostOf(item.url);
  const del = idx!==undefined ? `<button class="del" data-del="${idx}" title="Remove">🗑</button>` : "";
  const note = item.note ? `<p>${esc(item.note)}</p>` : "";
  return `<a class="card" href="${esc(item.url)}" target="_blank" rel="noopener">
    <span class="pill ${pillClass}">${pillText}</span>
    <div class="row1">
      <div class="ic">${item.ic||"🔗"}</div>
      <div style="min-width:0">
        <h3>${esc(item.title)}</h3>
        <div class="host">${esc(host)}</div>
      </div>
    </div>
    ${note}
    ${del}
  </a>`;
}

function match(item){
  if(!query) return true;
  return (item.title+" "+(item.note||"")+" "+item.url).toLowerCase().includes(query);
}

function render(){
  let html = "", shown = 0;

  const liveF = LIVE.filter(match);
  if(liveF.length){ shown+=liveF.length;
    html += `<div class="section"><h2>🚀 Live Sites <span class="cnt">${liveF.length}</span></h2>
      <div class="sdesc">Your published GitHub Pages sites.</div>
      <div class="grid">${liveF.map(i=>cardHTML(i,"pill-live","Live")).join("")}</div></div>`;
  }

  const savedF = saved.map((i,idx)=>({i,idx})).filter(x=>match(x.i));
  shown += savedF.length;
  html += `<div class="section"><h2>⭐ My Saved Links <span class="cnt">${saved.length}</span></h2>
    <div class="sdesc">Links you add yourself — saved privately in this browser.</div>
    <div class="grid">
      ${savedF.map(x=>cardHTML(x.i,"pill-mine","Mine",x.idx)).join("")}
      <div class="addcard" id="addCard"><div class="plus">＋</div><span>Add a link</span></div>
    </div></div>`;

  sectionsEl.innerHTML = html;
  noResEl.style.display = (query && shown===0) ? "block" : "none";
  document.getElementById('heroStat').textContent =
    `${LIVE.length} live sites · ${saved.length} saved`;
}

// ---------- interactions ----------
searchEl.addEventListener('input', ()=>{ query = searchEl.value.toLowerCase().trim(); render(); });

sectionsEl.addEventListener('click', e=>{
  if(e.target.id === 'addCard'){ openModal(); return; }
  const del = e.target.closest('[data-del]');
  if(del){
    e.preventDefault();
    const idx = +del.dataset.del;
    if(confirm(`Remove "${saved[idx].title}"?`)){ saved.splice(idx,1); storeSaved(saved); render(); }
  }
});

// ---------- modal ----------
const overlay = document.getElementById('overlay');
const mTitle=document.getElementById('mTitle'), mUrl=document.getElementById('mUrl'),
      mNote=document.getElementById('mNote'), mErr=document.getElementById('mErr'),
      iconRow=document.getElementById('iconRow');
let pickedIcon = ICONS[0];

ICONS.forEach((ic,i)=>{
  const b=document.createElement('div');
  b.className='iconpick'+(i===0?' sel':''); b.textContent=ic; b.dataset.ic=ic;
  iconRow.appendChild(b);
});
iconRow.addEventListener('click', e=>{
  const b=e.target.closest('.iconpick'); if(!b)return;
  pickedIcon=b.dataset.ic;
  [...iconRow.children].forEach(x=>x.classList.toggle('sel',x===b));
});

function openModal(){
  mTitle.value=""; mUrl.value=""; mNote.value=""; mErr.textContent="";
  pickedIcon=ICONS[0];
  [...iconRow.children].forEach((x,i)=>x.classList.toggle('sel',i===0));
  overlay.classList.add('open'); mTitle.focus();
}
function closeModal(){ overlay.classList.remove('open'); }

document.getElementById('mCancel').addEventListener('click', closeModal);
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

document.getElementById('mSave').addEventListener('click', ()=>{
  const title=mTitle.value.trim();
  let url=mUrl.value.trim();
  if(!title){ mErr.textContent="Please enter a title."; return; }
  if(!url){ mErr.textContent="Please enter a URL."; return; }
  if(!/^https?:\/\//i.test(url)) url = "https://"+url;   // be forgiving
  try{ new URL(url); }catch(_){ mErr.textContent="That URL doesn't look valid."; return; }
  saved.push({ic:pickedIcon, title, url, note:mNote.value.trim()});
  storeSaved(saved);
  closeModal();
  render();
});

mUrl.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('mSave').click(); });

render();
</script>
</body>
</html>
